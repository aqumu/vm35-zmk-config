# Build matrix for the GitHub Actions user-config workflow.
include:
  # Standalone macropad (with ZMK Studio live-editing support)
  - board: vm35
    snippet: studio-rpc-usb-uart
  # Settings-reset image: flash this FIRST to wipe stale BLE bonds /
  # endpoint state left over from previous firmware, then flash vm35.
  - board: vm35
    shield: settings_reset
  # Split targets (vm35_left / vm35_right) are being re-added as HWMv2
  # boards after the standalone build is confirmed working.
