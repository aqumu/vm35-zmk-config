# VM35 standalone macropad
CONFIG_ZMK_KEYBOARD_NAME="VM35"

# --- TEMPORARY: debug console over USB to watch matrix activity ---
# Exposes a serial (COM) port alongside the keyboard. Open it at 115200
# and press keys: each press should log a position/kscan event. Remove
# this block (and the cdc_acm_uart node + zephyr,console in the board
# .dts) once the matrix is confirmed working.
CONFIG_ZMK_USB_LOGGING=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Deep sleep after 15 min idle to save the battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Software control of the external-power gate (P1.09)
CONFIG_ZMK_EXT_POWER=y

# Battery level reporting over BLE
CONFIG_BT_BAS=y

# Stronger BLE TX for better range (optional)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
