# VM35 standalone macropad
CONFIG_ZMK_KEYBOARD_NAME="VM35"

# Deep sleep after 15 min idle to save the battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Software control of the external-power gate (P1.09)
CONFIG_ZMK_EXT_POWER=y

# Battery level reporting over BLE
CONFIG_BT_BAS=y

# Advertise as a Keyboard (GAP appearance 0x03C1) so hosts show the
# keyboard icon instead of a generic Bluetooth device.
CONFIG_BT_DEVICE_APPEARANCE=961

# Stronger BLE TX for better range (optional)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
